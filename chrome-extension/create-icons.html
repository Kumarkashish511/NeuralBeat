<!DOCTYPE html>
<html>

<head>
  <title>Aether Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #0a0a0f;
      color: #fafafa;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    canvas {
      border: 1px solid #333;
      margin: 10px;
      background: #1a1a2e;
      border-radius: 12px;
    }

    button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>VerseForge Extension Icon Generator</h1>
    <p>Click the button below to generate icons. Then right-click each canvas and "Save image as..."</p>

    <div>
      <canvas id="icon16" width="16" height="16"></canvas>
      <canvas id="icon32" width="32" height="32"></canvas>
      <canvas id="icon48" width="48" height="48"></canvas>
      <canvas id="icon128" width="128" height="128"></canvas>
    </div>

    <button onclick="generateIcons()">Regenerate Icons</button>
    <button onclick="downloadAll()">Download All Icons</button>
  </div>

  <script>
    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function generateIcons() {
      const sizes = [16, 32, 48, 128];

      sizes.forEach(size => {
        const canvas = document.getElementById(`icon${size}`);
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, size, size);

        // 🔑 Rounded clip
        const radius = Math.max(3, size * 0.22);
        roundedRect(ctx, 0, 0, size, size, radius);
        ctx.clip();

        // Gradient background
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(1, '#764ba2');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        // Logo stroke
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = Math.max(1, size / 16);
        ctx.lineCap = 'round';

        const scale = size / 24;
        const cx = size / 2;
        const cy = size / 2;

        // X mark (swords)
        ctx.beginPath();
        ctx.moveTo(cx - 8 * scale, cy - 8 * scale);
        ctx.lineTo(cx + 8 * scale, cy + 8 * scale);
        ctx.moveTo(cx + 8 * scale, cy - 8 * scale);
        ctx.lineTo(cx - 8 * scale, cy + 8 * scale);
        ctx.stroke();

        // Center dot
        ctx.beginPath();
        ctx.arc(cx, cy, 2 * scale, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
      });
    }

    function downloadAll() {
      [16, 32, 48, 128].forEach(size => {
        const canvas = document.getElementById(`icon${size}`);
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `icon${size}.png`;
          a.click();
          URL.revokeObjectURL(url);
        });
      });
    }

    window.onload = generateIcons;
  </script>
</body>

</html>
